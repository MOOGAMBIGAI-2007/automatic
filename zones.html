<!DOCTYPE html>
<html>
<head>
  <title>Select Vehicle</title>
  <style>
    body { background:#ffe6cc; font-family:Arial; text-align:center; margin-top:100px; }
    button { padding:15px 25px; margin:15px; font-size:18px; border:none; border-radius:8px; cursor:pointer; }
    .two { background:#28a745; color:white; }
    .four { background:#007bff; color:white; }
  </style>
</head>
<body>
  <h2>Select Vehicle Type</h2>
  <button class="two" onclick="go('Two Wheeler')">🚲 Two Wheeler</button>
  <button class="four" onclick="go('Four Wheeler')">🚗 Four Wheeler</button>
  <script>
    function go(v){ window.location.href="zones_select.html?vehicle="+encodeURIComponent(v); }
  </script>
</body>
</html>
