<!DOCTYPE html>
<html>
<head>
  <title>Parking Slots</title>
  <style>
    body { background:#f0f0f0; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
    .container { background:white; padding:30px; border-radius:10px; box-shadow:0 0 12px rgba(0,0,0,0.3); text-align:center; width:400px; }
    h2 { margin-bottom:20px; }
    .slots { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-top:20px; }
    .slot { width:70px; height:70px; display:flex; justify-content:center; align-items:center; border-radius:8px; font-weight:bold; cursor:pointer; color:white; }
    .free { background:#28a745; }
    .occupied { background:#dc3545; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="title"></h2>
    <div class="slots">
      <div class="slot free" onclick="book(this)">S1</div>
      <div class="slot occupied">S2</div>
      <div class="slot free" onclick="book(this)">S3</div>
      <div class="slot occupied">S4</div>
      <div class="slot free" onclick="book(this)">S5</div>
      <div class="slot free" onclick="book(this)">S6</div>
      <div class="slot occupied">S7</div>
      <div class="slot free" onclick="book(this)">S8</div>
    </div>
    <p id="msg"></p>
  </div>
  <script>
    const p=new URLSearchParams(window.location.search);
    document.getElementById("title").innerText=p.get("vehicle")+" - "+p.get("zone")+" Parking Slots";
    function book(s){
      if(s.classList.contains("free")){
        s.classList.remove("free"); s.classList.add("occupied");
        document.getElementById("msg").innerText=s.innerText+" booked ✅";
      } else {
        document.getElementById("msg").innerText=s.innerText+" already occupied ❌";
      }
    }
  </script>
</body>
</html>
