<!DOCTYPE html>
<html>
<head>
  <title>Select Zone</title>
  <style>
    body { background:#e6ffe6; font-family:Arial; text-align:center; margin-top:100px; }
    button { padding:15px 25px; margin:15px; font-size:18px; border:none; border-radius:8px; cursor:pointer; background:#ff5733; color:white; }
  </style>
</head>
<body>
  <h2>Select Zone</h2>
  <button onclick="goZone('Zone 1')">Zone 1</button>
  <button onclick="goZone('Zone 2')">Zone 2</button>
  <button onclick="goZone('Zone 3')">Zone 3</button>
  <script>
    function goZone(z){
      const v=new URLSearchParams(window.location.search).get("vehicle");
      window.location.href="slots.html?zone="+encodeURIComponent(z)+"&vehicle="+encodeURIComponent(v);
    }
  </script>
</body>
</html>
