<!DOCTYPE html>
<html>
<head>
  <title>Parking System Login</title>
  <style>
    body { background:#d0e7ff; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.3); text-align:center; }
    input, button { margin:10px; padding:10px; width:90%; }
    button { background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#0056b3; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🅿️ Parking System Login</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p id="message"></p>
  </div>
  <script>
    function login() {
      const u=document.getElementById("username").value;
      const p=document.getElementById("password").value;
      if(u==="park" && p==="1234"){ window.location.href="zones.html"; }
      else{ document.getElementById("message").innerText="Invalid ❌"; }
    }
  </script>
</body>
</html>
